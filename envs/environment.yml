name: sctda
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.12
  - scikit-learn>=1.3
  - jupyter
  - jupyterlab
  - ipywidgets

  # scRNA-seq core
  - scanpy>=1.10
  - anndata>=0.10
  - leidenalg
  - python-igraph
  - bbknn
  - scvi-tools

  # RNA velocity
  - scvelo

  # Enrichment
  - gseapy
  - decoupler

  # TDA
  - pip

  # Testing
  - pytest
  - pytest-cov

  # Linting
  - ruff

  # Utilities
  - tqdm
  - h5py
  - lxml
  - requests

  - pip:
    - ripser>=0.6
    - persim>=0.3
    - kmapper>=2.0
    - giotto-tda>=0.6
    - plotly>=5.0
    - adjustText
